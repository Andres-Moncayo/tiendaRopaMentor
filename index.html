<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="o-container">
        <header>
            <h1>Mi Tienda</h1>
            <button id="theme-toggle" class="c-filter__btn c-theme-toggle">
                Tema: Auto
            </button>
            <ul>
                <a href="#/">Home</a>
                <a href="#/about">about</a>
                <a href="#/cart">cart</a>
            </ul>
        </header>

        <!--Botones para Filtrado-->

        <div class="c-filter">
            <button class="c-filter__btn c-filter__btn--active" data-category="all">Todos</button>
            <button class="c-filter__btn" data-category="jewelery">Joyeria</button>
            <button class="c-filter__btn" data-category="men's clothing">Men's Clothing</button>
        </div>

        <!--Boton Carito-->

        <div id="contenedorRopa" class="o-grid"></div>

        <div class="cart cartStyle">
            <button id="cart" class="cartStyle__btn" type="button">
                <i class="fa-duotone fa-solid fa-cart-shopping"></i>
                <span id="canTot" style="padding-left: 0.3em;">0</span>
            </button>
        </div>

        <!-- Modal -->
        <div class="modal" id="cartModal">
            <div class="modal__overlay">
                <div class="modal__content">

                    <div class="modal__header">
                        <h2>Mi Carrito</h2>
                        <button class="modal__close" id="closeModalBtn" type="button">
                            <i class="fa-solid fa-rectangle-xmark"></i>
                        </button>
                    </div>

                    <div class="modal__body" id="cart-sumary">
                    </div>

                    <div class="modal__total">
                        <h2>Sub Total: <span id="totalCarrito">$0.00</span></h2>
                        <button class="modal__btn" style="margin-top: 10px;">Comprar</button>
                    </div>
                </div>
            </div>
        </div>


    <script defer type="module">
      import { init } from './js/app.js'
      init()
    </script>
</body>
</html>
